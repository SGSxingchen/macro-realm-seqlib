name: 发布序列库

on:
  push:
    tags:
      - "v*"

  workflow_dispatch:
    inputs:
      version:
        description: "版本号（如 v6.2）"
        required: true
        default: "dev"

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    env:
      PYTHONIOENCODING: utf-8

    steps:
      - name: 签出代码
        uses: actions/checkout@v4

      - name: 安装 Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: 安装 pandoc
        run: choco install pandoc -y
        shell: cmd

      - name: 部署 HTML Help Workshop（仓库自带）
        shell: bash
        run: |
          # 将仓库内置的 hhc.exe 加入 PATH
          HHW_DIR="$(pwd)/tools/hhw"
          echo "$HHW_DIR" >> "$GITHUB_PATH"
          echo "hhc.exe 路径: $HHW_DIR/hhc.exe"
          ls -lh "$HHW_DIR/"

      - name: 确定版本号
        id: version
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "push" ]; then
            echo "version=${{ github.ref_name }}" >> $GITHUB_OUTPUT
          else
            echo "version=${{ github.event.inputs.version }}" >> $GITHUB_OUTPUT
          fi

      - name: 构建 CHM 和 ZIP
        shell: bash
        run: |
          python build_chm.py \
            --version "${{ steps.version.outputs.version }}" \
            --source-dir . \
            --output-dir dist

      - name: 列出产物
        shell: bash
        run: ls -lh dist/

      # tag 推送时：创建 GitHub Release
      - name: 创建 Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          name: "宏观界域强化序列库 ${{ steps.version.outputs.version }}"
          files: |
            dist/*.chm
            dist/*.zip
          generate_release_notes: true

      # 手动触发时：上传为 Artifact
      - name: 上传构建产物
        if: ${{ !startsWith(github.ref, 'refs/tags/') }}
        uses: actions/upload-artifact@v4
        with:
          name: "序列库-${{ steps.version.outputs.version }}"
          path: dist/*
